name: Quality Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_call:

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Extract PHP version
      id: php_version
      run: |
        PHP_VERSION=$(grep -oP 'Requires PHP:\s*\K[\d.]+' fullworks-simple-setup-for-amazon-ses/fullworks-simple-setup-for-amazon-ses.php || echo "8.2")
        echo "version=$PHP_VERSION" >> $GITHUB_OUTPUT

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ steps.php_version.outputs.version }}
        tools: composer:v2,  wp-cli
        coverage: none

    - name: Validate composer.json
      run: |
        composer validate --no-check-all --no-check-publish
        cd fullworks-simple-setup-for-amazon-ses && composer validate --no-check-all --no-check-publish

    - name: Install dependencies
      run: |
        composer install --prefer-dist --no-progress
        cd fullworks-simple-setup-for-amazon-ses && composer install --prefer-dist --no-progress --no-dev

    - name: Run Security Checks
      run: composer run-script phpcs-security

    - name: Check PHP Compatibility
      run: composer run-script phpcompat

    - name: Check version consistency
      run: |
        PLUGIN_VERSION=$(grep -oP 'Version:\s*\K[\d.]+' fullworks-simple-setup-for-amazon-ses/fullworks-simple-setup-for-amazon-ses.php)
        README_VERSION=$(grep -oP 'Stable tag:\s*\K[\d.]+' fullworks-simple-setup-for-amazon-ses/readme.txt)
        CONSTANT_VERSION=$(grep -oP "FSSFAS_VERSION['\"],\s*['\"]\\K[\\d.]+" fullworks-simple-setup-for-amazon-ses/fullworks-simple-setup-for-amazon-ses.php)

        echo "Plugin header version: $PLUGIN_VERSION"
        echo "Readme stable tag: $README_VERSION"
        echo "Version constant: $CONSTANT_VERSION"

        if [ "$PLUGIN_VERSION" != "$README_VERSION" ] || [ "$PLUGIN_VERSION" != "$CONSTANT_VERSION" ]; then
          echo "Version mismatch detected!"
          exit 1
        fi
    - name: Install WP-CLI dist-archive command
      run: wp package install wp-cli/dist-archive-command:v3.1.0

    - name: Build plugin
      run: |
        cd fullworks-simple-setup-for-amazon-ses && composer install --no-dev && cd ..
        wp dist-archive ./fullworks-simple-setup-for-amazon-ses ./fullworks-simple-setup-for-amazon-ses.zip
        mkdir tmp-build
        unzip fullworks-simple-setup-for-amazon-ses.zip -d tmp-build

    - name: WordPress Plugin Check
      uses: wordpress/plugin-check-action@v1
      with:
        build-dir: 'tmp-build/fullworks-simple-setup-for-amazon-ses'
