name: Release

on:
  push:
    tags:
      - 'v*.*.*'    # Matches v1.7.3
      - '*.*.*'      # Matches 1.7.3
      - 'v*.*'       # Matches v2.3
      - '*.*'        # Matches 2.3

permissions:
  contents: write

jobs:
  quality-checks:
    uses: ./.github/workflows/checks.yml

  release:
    needs: quality-checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Extract PHP version
      id: php_version
      run: |
        PHP_VERSION=$(grep -oP 'Requires PHP:\s*\K[\d.]+' fullworks-simple-setup-for-amazon-ses/fullworks-simple-setup-for-amazon-ses.php || echo "8.2")
        echo "version=$PHP_VERSION" >> $GITHUB_OUTPUT

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ steps.php_version.outputs.version }}
        tools: composer:v2, wp-cli
        coverage: none

    - name: Verify tag matches plugin version
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        PLUGIN_VERSION=$(grep -oP 'Version:\s*\K[\d.]+' fullworks-simple-setup-for-amazon-ses/fullworks-simple-setup-for-amazon-ses.php)

        echo "Tag version: $TAG_VERSION"
        echo "Plugin version: $PLUGIN_VERSION"

        if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
          echo "Tag version does not match plugin version!"
          exit 1
        fi

    - name: Install dependencies
      run: |
        composer install --prefer-dist --no-progress --no-dev
        cd fullworks-simple-setup-for-amazon-ses && composer install --prefer-dist --no-progress --no-dev

    - name: Install WP-CLI dist-archive command
      run: wp package install wp-cli/dist-archive-command:v3.1.0

    - name: Build plugin
      run: composer run-script build

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: zipped/fullworks-simple-setup-for-amazon-ses.zip
        body: |
          Release of Fullworks Simple Setup for Amazon SES v${{ github.ref_name }}

          ## Installation
          1. Download `fullworks-simple-setup-for-amazon-ses.zip` from the assets below
          2. In WordPress admin, go to Plugins > Add New > Upload Plugin
          3. Choose the downloaded zip file and click Install Now
          4. Activate the plugin
          5. Configure your AWS credentials in Settings > Fullworks SES
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
